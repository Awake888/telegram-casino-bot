<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #f1c40f; --bg: #1a1a1a; --card: #2c2c2c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; background: var(--card); border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .balance { font-size: 26px; color: var(--accent); font-weight: bold; text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .game-card { background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 20px; border: 1px solid #444; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        /* КРАСИВОЕ КОЛЕСО */
        .wheel-box { position: relative; width: 260px; height: 260px; margin: 20px auto; }
        .wheel-container { 
            width: 100%; height: 100%; border: 8px solid #444; border-radius: 50%; 
            position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #e74c3c 0deg 45deg, #2c3e50 45deg 90deg, 
                #e74c3c 90deg 135deg, #2c3e50 135deg 180deg, 
                #e74c3c 180deg 225deg, #2c3e50 225deg 270deg, 
                #e74c3c 270deg 315deg, #2c3e50 315deg 360deg
            );
        }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 40px; color: var(--accent); }
        
        button { background: linear-gradient(135deg, #0088cc, #005588); color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { background: #333; color: white; border: 1px solid #555; padding: 12px; border-radius: 10px; width: 80%; margin-bottom: 15px; text-align: center; font-size: 18px; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #444; }
        .nav-item { color: #888; font-size: 14px; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div class="balance">💰 <span id="user-balance">0</span></div>
    </div>

    <div id="wheel-page" class="page active">
        <div class="game-card">
            <h2>🎡 Колесо Удачи</h2>
            <div class="wheel-box">
                <div class="wheel-pointer">▼</div>
                <div id="wheel-visual" class="wheel-container"></div>
            </div>
            <button id="spin-btn" onclick="claimBonus()">Крутить бесплатно</button>
        </div>
    </div>

    <div id="roulette-page" class="page">
        <div class="game-card">
            <h2>🔴 Рулетка</h2>
            <div style="font-size: 60px; margin: 20px;" id="roulette-result">🎰</div>
            <input type="number" id="roulette-bet" value="500">
            <div>
                <button onclick="playRoulette('red')" style="background: #e74c3c;">КРАСНОЕ</button>
                <button onclick="playRoulette('black')" style="background: #2c3e50;">ЧЕРНОЕ</button>
            </div>
        </div>
    </div>

    <div id="blackjack-page" class="page">
        <div class="game-card">
            <h2>🃏 Игра 21</h2>
            <div id="bj-area" style="font-size: 20px; margin: 20px 0;">
                <div id="dealer-hand">Дилер: ?</div>
                <div id="player-hand" style="font-weight: bold; margin-top: 10px;">Вы: ?</div>
            </div>
            <input type="number" id="bj-bet" value="1000">
            <div id="bj-controls"><button onclick="startBJ()">Раздать карты</button></div>
            <div id="bj-actions" style="display:none">
                <button onclick="bjAction('hit')">Еще</button>
                <button onclick="bjAction('stand')" style="background: #27ae60;">Хватит</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('wheel-page', this)">🎡 Колесо</div>
        <div class="nav-item" onclick="showPage('roulette-page', this)">🔴 Рулетка</div>
        <div class="nav-item" onclick="showPage('blackjack-page', this)">🃏 21</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // ПРОВЕРЬ ЭТУ ССЫЛКУ! Она должна совпадать с NGROK
        const BASE_URL = "https://matchbook-ecosystem-mutt.ngrok-free.dev"; 
        const userId = tg.initDataUnsafe.user?.id || 12345;

        let currentRotation = 0;

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
        }

        async function updateUI() {
            try {
                const r = await fetch(`${BASE_URL}/get_balance?user_id=${userId}`);
                const d = await r.json();
                document.getElementById('user-balance').innerText = d.balance.toLocaleString();
            } catch(e) { console.log("Сервер недоступен"); }
        }

        async function claimBonus() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            
            const wheel = document.getElementById('wheel-visual');
            const extraDeg = Math.floor(Math.random() * 360) + 1800; // Минимум 5 кругов
            currentRotation += extraDeg;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            try {
                const r = await fetch(`${BASE_URL}/bonus`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: userId })
                });
                const d = await r.json();
                
                setTimeout(() => {
                    alert(d.message);
                    updateUI();
                    btn.disabled = false;
                }, 4000);
            } catch(e) {
                alert("Ошибка сервера");
                btn.disabled = false;
            }
        }

        async function playRoulette(type) {
            const bet = parseInt(document.getElementById('roulette-bet').value);
            const r = await fetch(`${BASE_URL}/play_roulette`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, bet: bet, type: type })
            });
            const d = await r.json();
            if(!r.ok) return alert(d.error);
            document.getElementById('roulette-result').innerText = d.number;
            updateUI();
            alert(d.win > 0 ? `Победа! +${d.win}` : "Проигрыш");
        }

        async function startBJ() {
            const bet = parseInt(document.getElementById('bj-bet').value);
            const r = await fetch(`${BASE_URL}/bj_start`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, bet: bet })
            });
            const d = await r.json();
            if(!r.ok) return alert(d.error);
            updateBJ(d);
            document.getElementById('bj-controls').style.display = 'none';
            document.getElementById('bj-actions').style.display = 'block';
        }

        async function bjAction(action) {
            const r = await fetch(`${BASE_URL}/bj_action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, action: action })
            });
            const d = await r.json();
            updateBJ(d);
            if(d.status !== 'playing') {
                setTimeout(() => { alert(d.message); updateUI(); }, 200);
                document.getElementById('bj-controls').style.display = 'block';
                document.getElementById('bj-actions').style.display = 'none';
            }
        }

        function updateBJ(d) {
            document.getElementById('dealer-hand').innerText = `Дилер: ${d.dealer_hand.join(', ')} (${d.dealer_score})`;
            document.getElementById('player-hand').innerText = `Вы: ${d.player_hand.join(', ')} (${d.player_score})`;
        }

        updateUI();
        setInterval(updateUI, 5000); // Авто-обновление каждые 5 сек
    </script>
</body>
</html>
