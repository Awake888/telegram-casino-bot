<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #f1c40f; --bg: #1a1a1a; --card: #2c2c2c; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; background: var(--card); border-bottom: 2px solid var(--accent); position: sticky; top: 0; }
        .balance { font-size: 24px; color: var(--accent); font-weight: bold; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .game-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #444; }
        button { background: #0088cc; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; }
        input { background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 8px; width: 80%; margin-bottom: 15px; text-align: center; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #444; }
        .nav-item { color: #888; font-size: 14px; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        
        /* Колесо */
        .wheel-container { width: 220px; height: 220px; border: 10px solid var(--accent); border-radius: 50%; margin: 20px auto; position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); background: conic-gradient(#e74c3c 0 45deg, #2c3e50 45deg 90deg, #e74c3c 90deg 135deg, #2c3e50 135deg 180deg, #e74c3c 180deg 225deg, #2c3e50 225deg 270deg, #e74c3c 270deg 315deg, #2c3e50 315deg 360deg); }
        .wheel-container::after { content: '▼'; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: var(--accent); font-size: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="balance">💰 <span id="user-balance">0</span></div>
    </div>

    <div id="wheel-page" class="page active">
        <div class="game-card">
            <h2>🎡 Колесо Удачи</h2>
            <div id="wheel-visual" class="wheel-container"></div>
            <button onclick="claimBonus()">Крутить Бесплатно</button>
        </div>
    </div>

    <div id="roulette-page" class="page">
        <div class="game-card">
            <h2>🔴 Рулетка</h2>
            <div style="font-size: 50px; margin: 20px;" id="roulette-result">❓</div>
            <input type="number" id="roulette-bet" value="500">
            <div style="display: flex; justify-content: center;">
                <button onclick="playRoulette('red')" style="background: #e74c3c;">КРАСНОЕ</button>
                <button onclick="playRoulette('black')" style="background: #2c3e50;">ЧЕРНОЕ</button>
            </div>
        </div>
    </div>

    <div id="blackjack-page" class="page">
        <div class="game-card">
            <h2>🃏 Игра 21</h2>
            <div id="bj-area" style="font-size: 20px; margin-bottom: 10px;">
                <div id="dealer-hand">Дилер: ?</div>
                <div id="player-hand">Вы: ?</div>
            </div>
            <input type="number" id="bj-bet" value="1000">
            <div id="bj-controls"><button onclick="startBJ()">Играть</button></div>
            <div id="bj-actions" style="display:none">
                <button onclick="bjAction('hit')">Еще</button>
                <button onclick="bjAction('stand')" style="background: #27ae60;">Хватит</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('wheel-page', this)">🎡 Колесо</div>
        <div class="nav-item" onclick="showPage('roulette-page', this)">🔴 Рулетка</div>
        <div class="nav-item" onclick="showPage('blackjack-page', this)">🃏 21</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        const BASE_URL = "https://matchbook-ecosystem-mutt.ngrok-free.dev"; 
        const userId = tg.initDataUnsafe.user?.id || 12345;

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
        }

        async function updateUI() {
            try {
                const r = await fetch(`${BASE_URL}/get_balance?user_id=${userId}`);
                const d = await r.json();
                document.getElementById('user-balance').innerText = d.balance.toLocaleString();
            } catch(e) { console.error("Ошибка обновления!"); }
        }

        async function claimBonus() {
            const wheel = document.getElementById('wheel-visual');
            const deg = Math.floor(Math.random() * 360) + 1440;
            wheel.style.transform = `rotate(${deg}deg)`;
            
            const r = await fetch(`${BASE_URL}/bonus`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId })
            });
            const d = await r.json();
            setTimeout(() => { alert(d.message); updateUI(); }, 4100);
        }

        async function playRoulette(type) {
            const bet = document.getElementById('roulette-bet').value;
            const r = await fetch(`${BASE_URL}/play_roulette`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, bet: parseInt(bet), type: type })
            });
            const d = await r.json();
            if(!r.ok) return alert(d.error);
            document.getElementById('roulette-result').innerText = d.number;
            alert(d.win > 0 ? `Победа! +${d.win}` : "Проигрыш");
            updateUI();
        }

        async function startBJ() {
            const bet = document.getElementById('bj-bet').value;
            const r = await fetch(`${BASE_URL}/bj_start`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, bet: parseInt(bet) })
            });
            const d = await r.json();
            if(!r.ok) return alert(d.error);
            updateBJ(d);
            document.getElementById('bj-controls').style.display = 'none';
            document.getElementById('bj-actions').style.display = 'block';
        }

        async function bjAction(action) {
            const r = await fetch(`${BASE_URL}/bj_action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, action: action })
            });
            const d = await r.json();
            updateBJ(d);
            if(d.status !== 'playing') {
                alert(d.message);
                document.getElementById('bj-controls').style.display = 'block';
                document.getElementById('bj-actions').style.display = 'none';
                updateUI();
            }
        }

        function updateBJ(d) {
            document.getElementById('dealer-hand').innerText = `Дилер: ${d.dealer_hand.join(', ')} (${d.dealer_score})`;
            document.getElementById('player-hand').innerText = `Вы: ${d.player_hand.join(', ')} (${d.player_score})`;
        }

        updateUI();
    </script>
</body>
</html>
